services:
  mysql:
    image: mysql:8
    container_name: raina_mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: raina
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: raina_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
